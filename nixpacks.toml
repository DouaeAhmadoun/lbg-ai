[phases.setup]
aptPkgs = ["tesseract-ocr", "tesseract-ocr-fra", "tesseract-ocr-eng"]
nixPkgs = ["python311"]

[phases.install]
cmds = [
  "python3 -m venv /opt/venv",
  "/opt/venv/bin/pip install -r backend/requirements.txt"
]

[start]
cmd = "cd backend && /opt/venv/bin/uvicorn main:app --host 0.0.0.0 --port ${PORT:-8000}"
